<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">

  <h2>⚡ Ultimate Calculator</h2>

  <input type="text" id="display" readonly>

  <div class="buttons">

    <!-- Scientific -->
    <button onclick="func('sin')">sin</button>
    <button onclick="func('cos')">cos</button>
    <button onclick="func('log')">log</button>
    <button onclick="func('sqrt')">√</button>

    <!-- AC + Controls -->
    <button onclick="allClear()" class="ac">AC</button>
    <button onclick="deleteLast()">⌫</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('*')">*</button>

    <!-- Numbers -->
    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="calculate()">=</button>

    <button onclick="append('0')" class="zero">0</button>
    <button onclick="append('.')">.</button>

  </div>

  <!-- Extras -->
  <div class="extras">
    <button onclick="copyResult()">📋 Copy</button>
    <button onclick="toggleTheme()">🌗 Theme</button>
    <button onclick="clearHistory()">🧹 Clear History</button>
    <button onclick="startVoice()">🎤 Speak</button>
  </div>

  <!-- History -->
  <div class="history">
    <h3>History</h3>
    <ul id="history"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
